<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Taproom Trivia WNY — Scoreboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Dancing+Script:wght@600;700&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0A0D14;
    --panel:#12151F;
    --panel-2:#181C29;
    --teal:#2FC1B8;
    --teal-dim:#155C57;
    --coral:#FF6F52;
    --magenta:#E0507B;
    --indigo:#4B3184;
    --up:#3ED598;
    --down:#FF5C5C;
    --line:#262B3A;
    --text:#F2F1EE;
    --text-dim:#8890A0;

    --gold-1:#FCEBA6;
    --gold-2:#E3B23C;
    --gold-3:#8A6210;
    --silver-1:#F2F5F9;
    --silver-2:#B9C2CE;
    --silver-3:#5E6773;
    --bronze-1:#F0C89A;
    --bronze-2:#C97A3D;
    --bronze-3:#6E3D18;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;padding:0;height:100%;
    background:
      radial-gradient(1100px 550px at 12% -8%, rgba(47,193,184,0.16) 0%, transparent 60%),
      radial-gradient(1000px 520px at 108% 6%, rgba(255,111,82,0.14) 0%, transparent 55%),
      radial-gradient(900px 500px at 50% 115%, rgba(75,49,132,0.20) 0%, transparent 60%),
      var(--ink);
    color:var(--text);
    font-family:'Inter', Arial, sans-serif;
    overflow:hidden;
  }
  .stage{
    height:100vh;
    display:flex;
    flex-direction:column;
    padding:2.2vh 3vw 2vh;
  }
  .masthead{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:1.6vh;
    flex-shrink:0;
  }
  .brand{
    display:flex;
    align-items:center;
    gap:1vw;
  }
  .brand img{
    height:clamp(64px, 11vh, 130px);
    width:auto;
    filter: drop-shadow(0 4px 18px rgba(47,193,184,0.25));
  }
  .wny-tag{
    font-family:'Inter', sans-serif;
    font-weight:800;
    font-size:clamp(12px, 1.7vh, 18px);
    color:var(--coral);
    letter-spacing:4px;
    text-transform:uppercase;
    align-self:flex-end;
    margin-bottom:1.2vh;
  }
  .clockrow{
    display:flex;
    align-items:center;
    gap:14px;
    font-size:clamp(12px,1.6vh,18px);
    color:var(--text-dim);
    letter-spacing:2px;
    text-transform:uppercase;
  }
  .dot{
    width:9px;height:9px;border-radius:50%;
    background:var(--teal);
    box-shadow:0 0 10px var(--teal);
    animation:pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse{
    0%,100%{opacity:1; transform:scale(1);}
    50%{opacity:.4; transform:scale(0.7);}
  }

  .board{
    flex:1;
    display:flex;
    flex-direction:column;
    gap:1.1vh;
    overflow:hidden;
    justify-content:center;
  }

  .row{
    display:grid;
    grid-template-columns: 5.5vh 1fr auto;
    align-items:center;
    gap:2vw;
    background:linear-gradient(180deg, var(--panel-2), var(--panel));
    border:1px solid var(--line);
    border-radius:14px;
    padding:1.1vh 2vw;
    position:relative;
    overflow:hidden;
    transition: transform 500ms ease, box-shadow 500ms ease, border-color 500ms ease;
  }
  .row.rank-1{
    border-color: var(--teal-dim);
    box-shadow: 0 0 0 1px rgba(47,193,184,0.28), 0 10px 30px -10px rgba(47,193,184,0.30);
  }
  .row.rank-1::before{
    content:"";
    position:absolute; left:0; top:0; bottom:0; width:5px;
    background:linear-gradient(180deg, var(--teal), var(--coral));
    border-radius:14px 0 0 14px;
  }

  /* Medal states — active once the game is final (bonus results in) */
  .row.medal-gold, .row.medal-silver, .row.medal-bronze{
    border-color: transparent;
  }
  .row.medal-gold::before{
    content:""; position:absolute; left:0; top:0; bottom:0; width:6px;
    background:linear-gradient(180deg, var(--gold-1), var(--gold-2) 55%, var(--gold-3));
    border-radius:14px 0 0 14px;
  }
  .row.medal-silver::before{
    content:""; position:absolute; left:0; top:0; bottom:0; width:6px;
    background:linear-gradient(180deg, var(--silver-1), var(--silver-2) 55%, var(--silver-3));
    border-radius:14px 0 0 14px;
  }
  .row.medal-bronze::before{
    content:""; position:absolute; left:0; top:0; bottom:0; width:6px;
    background:linear-gradient(180deg, var(--bronze-1), var(--bronze-2) 55%, var(--bronze-3));
    border-radius:14px 0 0 14px;
  }
  .row.medal-gold{
    box-shadow: 0 0 0 1px rgba(227,178,60,0.45), 0 12px 34px -10px rgba(227,178,60,0.35);
  }
  .row.medal-silver{
    box-shadow: 0 0 0 1px rgba(185,194,206,0.4), 0 12px 34px -10px rgba(185,194,206,0.3);
  }
  .row.medal-bronze{
    box-shadow: 0 0 0 1px rgba(201,122,61,0.4), 0 12px 34px -10px rgba(201,122,61,0.3);
  }
  /* soft diagonal sheen sweeping across medal rows */
  .row.medal-gold::after, .row.medal-silver::after, .row.medal-bronze::after{
    content:"";
    position:absolute; top:0; left:-60%; width:40%; height:100%;
    background:linear-gradient(115deg, transparent, rgba(255,255,255,0.16), transparent);
    animation: sheen 5s ease-in-out infinite;
    pointer-events:none;
  }
  .row.medal-silver::after{ animation-delay:0.6s; }
  .row.medal-bronze::after{ animation-delay:1.2s; }
  @keyframes sheen{
    0%{ left:-60%; }
    35%{ left:130%; }
    100%{ left:130%; }
  }

  .rank{
    font-family:'Playfair Display', serif;
    font-weight:900;
    font-size:clamp(20px, 3vh, 34px);
    color:var(--text-dim);
    text-align:center;
  }
  .rank-1 .rank{ color:var(--teal); }

  .medal-badge{
    width:clamp(30px, 4.6vh, 52px);
    height:clamp(30px, 4.6vh, 52px);
    border-radius:50%;
    margin:0 auto;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'Playfair Display', serif;
    font-weight:900;
    font-size:clamp(14px, 2.1vh, 24px);
    color:#241505;
    position:relative;
  }
  .medal-gold .medal-badge{
    background:radial-gradient(circle at 32% 28%, var(--gold-1), var(--gold-2) 60%, var(--gold-3));
    box-shadow: inset 0 1px 2px rgba(255,255,255,0.7), inset 0 -3px 6px rgba(0,0,0,0.35), 0 3px 10px rgba(227,178,60,0.5);
  }
  .medal-silver .medal-badge{
    background:radial-gradient(circle at 32% 28%, var(--silver-1), var(--silver-2) 60%, var(--silver-3));
    box-shadow: inset 0 1px 2px rgba(255,255,255,0.8), inset 0 -3px 6px rgba(0,0,0,0.3), 0 3px 10px rgba(185,194,206,0.45);
    color:#20242B;
  }
  .medal-bronze .medal-badge{
    background:radial-gradient(circle at 32% 28%, var(--bronze-1), var(--bronze-2) 60%, var(--bronze-3));
    box-shadow: inset 0 1px 2px rgba(255,230,210,0.6), inset 0 -3px 6px rgba(0,0,0,0.35), 0 3px 10px rgba(201,122,61,0.45);
    color:#2A1508;
  }

  .teamblock{
    display:flex;
    flex-direction:column;
    gap:2px;
    min-width:0;
  }
  .team{
    font-size:clamp(18px, 3.1vh, 40px);
    font-weight:700;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    letter-spacing:0.3px;
  }
  .rounds{
    font-size:clamp(10px, 1.3vh, 15px);
    color:var(--text-dim);
    letter-spacing:1px;
    text-transform:uppercase;
  }
  .rounds .rval{ color:#A9AFBD; }

  .scoreblock{
    display:flex;
    align-items:baseline;
    gap:10px;
    justify-self:end;
  }
  .delta{
    font-size:clamp(12px,1.8vh,20px);
    font-weight:700;
    padding:2px 8px;
    border-radius:20px;
    opacity:0;
    transform:translateY(4px);
    transition:opacity 400ms ease, transform 400ms ease;
  }
  .delta.show{ opacity:1; transform:translateY(0); }
  .delta.up{ color:var(--up); background:rgba(62,213,152,0.12); }
  .delta.down{ color:var(--down); background:rgba(255,92,92,0.12); }

  .score{
    font-family:'Playfair Display', serif;
    font-weight:900;
    font-size:clamp(28px, 5.2vh, 58px);
    color:var(--teal);
    min-width:2ch;
    text-align:right;
    font-variant-numeric: tabular-nums;
  }

  .score.bump{
    animation: bump 650ms ease;
  }
  @keyframes bump{
    0%{ transform:scale(1); }
    30%{ transform:scale(1.18); text-shadow:0 0 24px rgba(47,193,184,0.85); }
    100%{ transform:scale(1); }
  }

  .footer{
    flex-shrink:0;
    margin-top:1.4vh;
    display:flex;
    justify-content:space-between;
    font-size:clamp(10px,1.3vh,14px);
    color:var(--text-dim);
    letter-spacing:1.5px;
    text-transform:uppercase;
  }

  .empty{
    color:var(--text-dim);
    font-size:clamp(16px,2.4vh,26px);
    text-align:center;
    padding:6vh 0;
  }

  .error-banner{
    background:rgba(255,92,92,0.12);
    border:1px solid rgba(255,92,92,0.4);
    color:var(--down);
    padding:10px 16px;
    border-radius:10px;
    font-size:14px;
    margin-bottom:1.2vh;
    display:none;
  }
</style>
</head>
<body>
<div class="stage">
  <div class="masthead">
    <div class="brand">
      <img src="Taproom_Trivia_Logo.png" alt="Taproom Trivia logo">
    </div>
    <div class="clockrow"><span class="dot"></span><span id="statusText">Connecting…</span></div>
  </div>

  <div class="error-banner" id="errorBanner"></div>

  <div class="board" id="board">
    <div class="empty">Waiting for scores…</div>
  </div>

  <div class="footer">
    <span id="teamCount"></span>
    <span id="lastUpdated"></span>
  </div>
</div>

<script>
/* ============================================================
   CONFIG — edit these two lines for your game
   ============================================================ */

// Your Google Sheet's ID — the long string in its URL between
// /d/ and /edit, e.g. docs.google.com/spreadsheets/d/THIS_PART/edit
const SHEET_ID = "1Ks9X2Q6fzZuOmXsLBAVLaNH2VT07lpF9FcTdrmAqjqQ";

// Your Scores tab's gid — the number after "gid=" in the URL when
// that tab is open, e.g. .../edit?gid=THIS_NUMBER#gid=THIS_NUMBER
const GID = "1939092739";

// Just needs "Anyone with the link can view" turned on
// (File -> Share -> General access) — no need to Publish to web.

// How often to re-fetch scores, in milliseconds.
const REFRESH_MS = 5000;

/* ============================================================
   Everything below this line should just work.
   Expected columns (any order, matched by header name):
   Team Name | Round 1 | Round 2 | Round 3 | Round 4 | Round 5 | Final
   ============================================================ */

const ROUND_KEYS = ["Round 1","Round 2","Round 3","Round 4","Round 5"];
let previousScores = {}; // team name -> last known Final score
let lastGoodTeamCount = 0; // used to ignore transient partial reads
let consecutiveLowReads = 0;

function tableToTeams(table){
  const headers = table.cols.map(c => (c.label || "").trim());
  const idx = name => headers.findIndex(h => h.toLowerCase() === name.toLowerCase());

  const nameIdx = idx("Team Name");
  const finalIdx = idx("Final");
  const roundIdx = ROUND_KEYS.map(k => idx(k));
  const bonusIdx = idx("Bonus (Y/N)");
  const wagerIdx = idx("Wager");

  if(nameIdx === -1){
    throw new Error('Could not find a "Team Name" column. Check that GID points at your Scores tab and its header row says exactly "Team Name".');
  }

  const teams = [];
  for(const row of table.rows){
    const cells = row.c || [];
    const cellVal = (ci) => {
      if(ci === -1 || !cells[ci]) return "";
      const cell = cells[ci];
      return cell.v === null || cell.v === undefined ? "" : cell.v;
    };

    const name = String(cellVal(nameIdx)).trim();
    if(!name) continue;

    const rounds = roundIdx.map(ci => {
      const v = cellVal(ci);
      return v === "" ? null : v;
    });

    const bonus = String(cellVal(bonusIdx)).trim().toUpperCase();
    const wagerRaw = cellVal(wagerIdx);
    const wager = wagerRaw === "" ? null : wagerRaw;

    let final;
    const finalRaw = cellVal(finalIdx);
    if(finalRaw !== ""){
      final = parseFloat(finalRaw);
    } else {
      final = rounds.reduce((sum, v) => sum + (parseFloat(v) || 0), 0);
    }
    if(isNaN(final)) final = 0;

    teams.push({ name, rounds, final, bonus, wager });
  }
  return teams;
}

function render(teams){
  const board = document.getElementById("board");
  const teamCount = document.getElementById("teamCount");

  if(!teams.length){
    board.innerHTML = '<div class="empty">Waiting for scores…</div>';
    teamCount.textContent = "";
    return;
  }

  teams.sort((a,b) => b.final - a.final);
  teamCount.textContent = teams.length + (teams.length === 1 ? " team" : " teams");

  // Game is "final" once every team has a Y or N in the Bonus column —
  // that's when we switch the top 3 rows to gold/silver/bronze.
  const gameFinal = teams.every(t => t.bonus === "Y" || t.bonus === "N");

  board.innerHTML = teams.map((t, i) => {
    const rank = i + 1;
    const prev = previousScores[t.name];
    let deltaHtml = "";
    if(prev !== undefined && prev !== t.final){
      const diff = t.final - prev;
      const cls = diff > 0 ? "up" : "down";
      const sign = diff > 0 ? "+" : "";
      deltaHtml = `<span class="delta show ${cls}">${sign}${diff}</span>`;
    }

    const roundParts = t.rounds
      .map((v, idx) => v !== null && v !== "" ? `R${idx+1} <span class="rval">${v}</span>` : "")
      .filter(Boolean);

    if(t.wager !== null && t.wager !== ""){
      roundParts.push(`Wager <span class="rval">${t.wager}</span>`);
    }
    if(t.bonus === "Y" || t.bonus === "N"){
      roundParts.push(`Bonus <span class="rval">${t.bonus}</span>`);
    }
    const roundsLabel = roundParts.join("&nbsp;&nbsp;·&nbsp;&nbsp;");

    let rowClass = "";
    let rankInner = String(rank);
    if(gameFinal && rank === 1){ rowClass = "medal-gold"; rankInner = `<div class="medal-badge">1</div>`; }
    else if(gameFinal && rank === 2){ rowClass = "medal-silver"; rankInner = `<div class="medal-badge">2</div>`; }
    else if(gameFinal && rank === 3){ rowClass = "medal-bronze"; rankInner = `<div class="medal-badge">3</div>`; }
    else if(rank === 1){ rowClass = "rank-1"; }

    return `
      <div class="row ${rowClass}">
        <div class="rank">${rankInner}</div>
        <div class="teamblock">
          <div class="team">${escapeHtml(t.name)}</div>
          <div class="rounds">${roundsLabel}</div>
        </div>
        <div class="scoreblock">
          ${deltaHtml}
          <div class="score" data-team="${escapeHtml(t.name)}">${t.final}</div>
        </div>
      </div>
    `;
  }).join("");

  // bump animation for changed scores
  teams.forEach(t => {
    const prev = previousScores[t.name];
    if(prev !== undefined && prev !== t.final){
      const el = board.querySelector(`.score[data-team="${cssEscape(t.name)}"]`);
      if(el){
        el.classList.add("bump");
        setTimeout(() => el.classList.remove("bump"), 700);
      }
    }
    previousScores[t.name] = t.final;
  });
}

function escapeHtml(s){
  return s.replace(/[&<>"']/g, m => ({
    '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'
  }[m]));
}
function cssEscape(s){
  return s.replace(/["\\]/g, '\\$&');
}

let jsonpCounter = 0;

function fetchScores(){
  const statusText = document.getElementById("statusText");
  const errorBanner = document.getElementById("errorBanner");
  const lastUpdated = document.getElementById("lastUpdated");

  if(SHEET_ID.includes("PASTE_YOUR_SHEET_ID_HERE")){
    errorBanner.style.display = "block";
    errorBanner.textContent = "Set SHEET_ID (and GID) at the top of the script to your Google Sheet's ID.";
    statusText.textContent = "Not configured";
    return;
  }

  const callbackName = "__scoreboardCb" + (jsonpCounter++);
  let settled = false;

  const cleanup = (script, timeoutId) => {
    clearTimeout(timeoutId);
    delete window[callbackName];
    if(script && script.parentNode) script.parentNode.removeChild(script);
  };

  window[callbackName] = function(json){
    if(settled) return;
    settled = true;
    try{
      if(json.status === "error"){
        throw new Error(json.errors && json.errors[0] ? json.errors[0].detailed_message : "Sheet returned an error.");
      }
      const teams = tableToTeams(json.table);

      // Google occasionally serves a partial/stale snapshot mid-refresh.
      // If this read has noticeably fewer teams than the last good read,
      // treat it as a glitch and keep showing what we have.
      if(lastGoodTeamCount > 0 && teams.length < lastGoodTeamCount && consecutiveLowReads < 2){
        consecutiveLowReads++;
        statusText.textContent = "Live";
        lastUpdated.textContent = "Updated " + new Date().toLocaleTimeString() + " (skipped partial read)";
        return;
      }
      consecutiveLowReads = 0;

      render(teams);
      lastGoodTeamCount = teams.length;
      errorBanner.style.display = "none";
      statusText.textContent = "Live";
      lastUpdated.textContent = "Updated " + new Date().toLocaleTimeString();
    } catch(err){
      errorBanner.style.display = "block";
      errorBanner.textContent = "Couldn't load scores: " + err.message;
      statusText.textContent = "Reconnecting…";
    }
  };

  const script = document.createElement("script");
  const url = "https://docs.google.com/spreadsheets/d/" + SHEET_ID +
    "/gviz/tq?gid=" + encodeURIComponent(GID) +
    "&headers=1&tqx=out:json;responseHandler:" + callbackName +
    "&cb=" + Date.now();
  script.src = url;

  const timeoutId = setTimeout(() => {
    if(settled) return;
    settled = true;
    errorBanner.style.display = "block";
    errorBanner.textContent = "Couldn't reach the sheet — check SHEET_ID/GID and that sharing is set to 'Anyone with the link can view'.";
    statusText.textContent = "Reconnecting…";
    cleanup(script, timeoutId);
  }, 8000);

  script.onerror = () => {
    if(settled) return;
    settled = true;
    errorBanner.style.display = "block";
    errorBanner.textContent = "Couldn't reach the sheet — check SHEET_ID/GID and that sharing is set to 'Anyone with the link can view'.";
    statusText.textContent = "Reconnecting…";
    cleanup(script, timeoutId);
  };

  script.onload = () => cleanup(script, timeoutId);

  document.body.appendChild(script);
}

fetchScores();
setInterval(fetchScores, REFRESH_MS);
</script>
</body>
</html>
