<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Taproom Trivia WNY — Scoreboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Dancing+Script:wght@600;700&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0A0D14;
    --panel:#12151F;
    --panel-2:#181C29;
    --teal:#2FC1B8;
    --teal-dim:#155C57;
    --coral:#FF6F52;
    --magenta:#E0507B;
    --indigo:#4B3184;
    --up:#3ED598;
    --down:#FF5C5C;
    --line:#262B3A;
    --text:#F2F1EE;
    --text-dim:#8890A0;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;padding:0;height:100%;
    background:
      radial-gradient(1100px 550px at 12% -8%, rgba(47,193,184,0.16) 0%, transparent 60%),
      radial-gradient(1000px 520px at 108% 6%, rgba(255,111,82,0.14) 0%, transparent 55%),
      radial-gradient(900px 500px at 50% 115%, rgba(75,49,132,0.20) 0%, transparent 60%),
      var(--ink);
    color:var(--text);
    font-family:'Inter', Arial, sans-serif;
    overflow:hidden;
  }
  .stage{
    height:100vh;
    display:flex;
    flex-direction:column;
    padding:2.2vh 3vw 2vh;
  }
  .masthead{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:1.6vh;
    flex-shrink:0;
  }
  .brand{
    display:flex;
    align-items:center;
    gap:1vw;
  }
  .brand img{
    height:clamp(64px, 11vh, 130px);
    width:auto;
    filter: drop-shadow(0 4px 18px rgba(47,193,184,0.25));
  }
  .wny-tag{
    font-family:'Inter', sans-serif;
    font-weight:800;
    font-size:clamp(12px, 1.7vh, 18px);
    color:var(--coral);
    letter-spacing:4px;
    text-transform:uppercase;
    align-self:flex-end;
    margin-bottom:1.2vh;
  }
  .clockrow{
    display:flex;
    align-items:center;
    gap:14px;
    font-size:clamp(12px,1.6vh,18px);
    color:var(--text-dim);
    letter-spacing:2px;
    text-transform:uppercase;
  }
  .dot{
    width:9px;height:9px;border-radius:50%;
    background:var(--teal);
    box-shadow:0 0 10px var(--teal);
    animation:pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse{
    0%,100%{opacity:1; transform:scale(1);}
    50%{opacity:.4; transform:scale(0.7);}
  }

  .board{
    flex:1;
    display:flex;
    flex-direction:column;
    gap:1.1vh;
    overflow:hidden;
    justify-content:center;
  }

  .row{
    display:grid;
    grid-template-columns: 5.5vh 1fr auto;
    align-items:center;
    gap:2vw;
    background:linear-gradient(180deg, var(--panel-2), var(--panel));
    border:1px solid var(--line);
    border-radius:14px;
    padding:1.1vh 2vw;
    position:relative;
    transition: transform 500ms ease, box-shadow 500ms ease;
  }
  .row.rank-1{
    border-color: var(--teal-dim);
    box-shadow: 0 0 0 1px rgba(47,193,184,0.28), 0 10px 30px -10px rgba(47,193,184,0.30);
  }
  .row.rank-1::before{
    content:"";
    position:absolute; left:0; top:0; bottom:0; width:5px;
    background:linear-gradient(180deg, var(--teal), var(--coral));
    border-radius:14px 0 0 14px;
  }
  .rank{
    font-family:'Playfair Display', serif;
    font-weight:900;
    font-size:clamp(20px, 3vh, 34px);
    color:var(--text-dim);
    text-align:center;
  }
  .rank-1 .rank{ color:var(--teal); }

  .teamblock{
    display:flex;
    flex-direction:column;
    gap:2px;
    min-width:0;
  }
  .team{
    font-size:clamp(18px, 3.1vh, 40px);
    font-weight:700;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    letter-spacing:0.3px;
  }
  .rounds{
    font-size:clamp(10px, 1.3vh, 15px);
    color:var(--text-dim);
    letter-spacing:1px;
    text-transform:uppercase;
  }
  .rounds .rval{ color:#A9AFBD; }

  .scoreblock{
    display:flex;
    align-items:baseline;
    gap:10px;
    justify-self:end;
  }
  .delta{
    font-size:clamp(12px,1.8vh,20px);
    font-weight:700;
    padding:2px 8px;
    border-radius:20px;
    opacity:0;
    transform:translateY(4px);
    transition:opacity 400ms ease, transform 400ms ease;
  }
  .delta.show{ opacity:1; transform:translateY(0); }
  .delta.up{ color:var(--up); background:rgba(62,213,152,0.12); }
  .delta.down{ color:var(--down); background:rgba(255,92,92,0.12); }

  .score{
    font-family:'Playfair Display', serif;
    font-weight:900;
    font-size:clamp(28px, 5.2vh, 58px);
    color:var(--teal);
    min-width:2ch;
    text-align:right;
    font-variant-numeric: tabular-nums;
  }

  .score.bump{
    animation: bump 650ms ease;
  }
  @keyframes bump{
    0%{ transform:scale(1); }
    30%{ transform:scale(1.18); text-shadow:0 0 24px rgba(47,193,184,0.85); }
    100%{ transform:scale(1); }
  }

  .footer{
    flex-shrink:0;
    margin-top:1.4vh;
    display:flex;
    justify-content:space-between;
    font-size:clamp(10px,1.3vh,14px);
    color:var(--text-dim);
    letter-spacing:1.5px;
    text-transform:uppercase;
  }

  .empty{
    color:var(--text-dim);
    font-size:clamp(16px,2.4vh,26px);
    text-align:center;
    padding:6vh 0;
  }

  .error-banner{
    background:rgba(255,92,92,0.12);
    border:1px solid rgba(255,92,92,0.4);
    color:var(--down);
    padding:10px 16px;
    border-radius:10px;
    font-size:14px;
    margin-bottom:1.2vh;
    display:none;
  }
</style>
</head>
<body>
<div class="stage">
  <div class="masthead">
    <div class="brand">
      <img src="Taproom_Trivia_Logo.png" alt="Taproom Trivia logo">
    </div>
    <div class="clockrow"><span class="dot"></span><span id="statusText">Connecting…</span></div>
  </div>

  <div class="error-banner" id="errorBanner"></div>

  <div class="board" id="board">
    <div class="empty">Waiting for scores…</div>
  </div>

  <div class="footer">
    <span id="teamCount"></span>
    <span id="lastUpdated"></span>
  </div>
</div>

<script>
/* ============================================================
   CONFIG — edit these two lines for your game
   ============================================================ */

// Paste your sheet's published CSV link here.
// Google Sheet -> File -> Share -> Publish to web -> select the
// "Scores" tab -> format: Comma-separated values (.csv) -> Publish
// Then paste that URL below.
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR6bfjeD-PKKp_jYr_8EezDrdG0VnJ2CXa-AyV8a93jHNTqgLedb7511KKAuMm5FhU9KE-0SQMbChxg/pub?gid=1939092739&single=true&output=csv";

// How often to re-fetch scores, in milliseconds.
const REFRESH_MS = 5000;

/* ============================================================
   Everything below this line should just work.
   Expected columns (any order, matched by header name):
   Team Name | Round 1 | Round 2 | Round 3 | Round 4 | Round 5 | Final
   ============================================================ */

const ROUND_KEYS = ["Round 1","Round 2","Round 3","Round 4","Round 5"];
let previousScores = {}; // team name -> last known Final score
let lastGoodTeamCount = 0; // used to ignore transient partial CSV reads

function parseCSV(text){
  // Minimal CSV parser that handles quoted fields with commas.
  const rows = [];
  let row = [], field = "", inQuotes = false;
  for(let i=0;i<text.length;i++){
    const c = text[i];
    if(inQuotes){
      if(c === '"'){
        if(text[i+1] === '"'){ field += '"'; i++; }
        else inQuotes = false;
      } else field += c;
    } else {
      if(c === '"') inQuotes = true;
      else if(c === ','){ row.push(field); field = ""; }
      else if(c === '\n'){ row.push(field); rows.push(row); row = []; field = ""; }
      else if(c === '\r'){ /* skip */ }
      else field += c;
    }
  }
  if(field.length || row.length){ row.push(field); rows.push(row); }
  return rows.filter(r => r.some(v => v.trim() !== ""));
}

function rowsToTeams(rows){
  if(rows.length < 2) return [];
  const headers = rows[0].map(h => h.replace(/\uFEFF/g, "").trim());
  const idx = name => headers.findIndex(h => h.toLowerCase() === name.toLowerCase());

  const nameIdx = idx("Team Name");
  const finalIdx = idx("Final");
  const roundIdx = ROUND_KEYS.map(k => idx(k));

  if(nameIdx === -1){
    throw new Error('Could not find a "Team Name" column in the sheet.');
  }

  const teams = [];
  for(let r = 1; r < rows.length; r++){
    const row = rows[r];
    const name = (row[nameIdx] || "").trim();
    if(!name) continue;

    const rounds = roundIdx.map(ci => ci === -1 ? null : (row[ci] || "").trim());
    let final;
    if(finalIdx !== -1 && row[finalIdx] !== undefined && row[finalIdx].trim() !== ""){
      final = parseFloat(row[finalIdx]);
    } else {
      final = rounds.reduce((sum, v) => sum + (parseFloat(v) || 0), 0);
    }
    if(isNaN(final)) final = 0;

    teams.push({ name, rounds, final });
  }
  return teams;
}

function render(teams){
  const board = document.getElementById("board");
  const teamCount = document.getElementById("teamCount");

  if(!teams.length){
    board.innerHTML = '<div class="empty">Waiting for scores…</div>';
    teamCount.textContent = "";
    return;
  }

  teams.sort((a,b) => b.final - a.final);
  teamCount.textContent = teams.length + (teams.length === 1 ? " team" : " teams");

  board.innerHTML = teams.map((t, i) => {
    const rank = i + 1;
    const prev = previousScores[t.name];
    let deltaHtml = "";
    if(prev !== undefined && prev !== t.final){
      const diff = t.final - prev;
      const cls = diff > 0 ? "up" : "down";
      const sign = diff > 0 ? "+" : "";
      deltaHtml = `<span class="delta show ${cls}">${sign}${diff}</span>`;
    }

    const roundsLabel = t.rounds
      .map((v, idx) => v !== null && v !== "" ? `R${idx+1} <span class="rval">${v}</span>` : "")
      .filter(Boolean)
      .join("&nbsp;&nbsp;·&nbsp;&nbsp;");

    return `
      <div class="row ${rank === 1 ? 'rank-1' : ''}">
        <div class="rank">${rank}</div>
        <div class="teamblock">
          <div class="team">${escapeHtml(t.name)}</div>
          <div class="rounds">${roundsLabel}</div>
        </div>
        <div class="scoreblock">
          ${deltaHtml}
          <div class="score" data-team="${escapeHtml(t.name)}">${t.final}</div>
        </div>
      </div>
    `;
  }).join("");

  // bump animation for changed scores
  teams.forEach(t => {
    const prev = previousScores[t.name];
    if(prev !== undefined && prev !== t.final){
      const el = board.querySelector(`.score[data-team="${cssEscape(t.name)}"]`);
      if(el){
        el.classList.add("bump");
        setTimeout(() => el.classList.remove("bump"), 700);
      }
    }
    previousScores[t.name] = t.final;
  });
}

function escapeHtml(s){
  return s.replace(/[&<>"']/g, m => ({
    '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'
  }[m]));
}
function cssEscape(s){
  return s.replace(/["\\]/g, '\\$&');
}

async function fetchScores(){
  const statusText = document.getElementById("statusText");
  const errorBanner = document.getElementById("errorBanner");
  const lastUpdated = document.getElementById("lastUpdated");

  if(CSV_URL.includes("PASTE_YOUR_PUBLISHED_CSV_URL_HERE")){
    errorBanner.style.display = "block";
    errorBanner.textContent = "Set CSV_URL at the top of the script to your published Google Sheet CSV link.";
    statusText.textContent = "Not configured";
    return;
  }

  try{
    const res = await fetch(CSV_URL + (CSV_URL.includes("?") ? "&" : "?") + "cb=" + Date.now());
    if(!res.ok) throw new Error("HTTP " + res.status);
    let text = await res.text();
    // Google's CSV export often prepends a UTF-8 BOM before the first
    // header, which silently breaks exact header-name matching.
    text = text.replace(/^\uFEFF/, "");
    const rows = parseCSV(text);
    const teams = rowsToTeams(rows);

    // Google's published CSV occasionally serves a partial/stale snapshot
    // mid-refresh. If this fetch has noticeably fewer teams than the last
    // good fetch, treat it as a glitch and keep showing what we have
    // instead of flashing an incomplete board.
    if(lastGoodTeamCount > 0 && teams.length > 0 && teams.length < lastGoodTeamCount){
      statusText.textContent = "Live";
      lastUpdated.textContent = "Updated " + new Date().toLocaleTimeString() + " (skipped partial read)";
      return;
    }

    render(teams);
    lastGoodTeamCount = teams.length;
    errorBanner.style.display = "none";
    statusText.textContent = "Live";
    lastUpdated.textContent = "Updated " + new Date().toLocaleTimeString();
  } catch(err){
    errorBanner.style.display = "block";
    errorBanner.textContent = "Couldn't load scores: " + err.message;
    statusText.textContent = "Reconnecting…";
  }
}

fetchScores();
setInterval(fetchScores, REFRESH_MS);
</script>
</body>
</html>
